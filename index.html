<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EclipseCopilot | Advanced Luau AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <section id="home" class="view">
            <nav class="navbar">
                <div class="logo">Eclipse<span>Copilot</span></div>
                <div class="nav-links">
                    <button onclick="nav('dashboard')" class="btn-primary glow-btn">Dashboard</button>
                </div>
            </nav>
            <main class="hero">
                <div class="hero-inner">
                    <h1 class="reveal">The Future of <span class="accent">Roblox</span> Scripting.</h1>
                    <p>Potencialize seu desenvolvimento com IA de elite dedicada ao ecossistema Luau.</p>
                    <div class="hero-actions">
                        <button onclick="nav('dashboard')" class="main-cta">Get Started</button>
                    </div>
                </div>
                <div class="hero-visual">
                    <div class="sphere"></div>
                </div>
            </main>
        </section>

        <section id="dashboard" class="view hidden">
            <aside class="sidebar">
                <div class="sidebar-header" onclick="nav('home')">
                    <i class="fas fa-moon"></i> <span>Eclipse</span>
                </div>
                <div class="sidebar-nav">
                    <button class="side-item active"><i class="fas fa-terminal"></i> Editor</button>
                    <button class="side-item" onclick="clearAll()"><i class="fas fa-trash"></i> Reset</button>
                </div>
                <div class="sidebar-footer">
                    <select id="model-select" class="glass-select">
                        <option value="llama3-70b-8192">Llama3 70B</option>
                    </select>
                    <input type="password" id="api-key" placeholder="Groq API Key" onchange="saveConfig()">
                </div>
            </aside>

            <main class="editor-view">
                <header class="editor-header">
                    <div class="breadcrumb">Dashboard / <span>Script Editor</span></div>
                    <div class="status-badge" id="api-status">● Offline</div>
                </header>

                <div class="editor-grid">
                    <div class="panel">
                        <div class="panel-label">Input Source</div>
                        <div class="code-container">
                            <div class="lines" id="ln-input">1</div>
                            <textarea id="input-editor" placeholder="-- Insira seu código ou prompt aqui..."></textarea>
                        </div>
                    </div>
                    <div class="panel result-panel">
                        <div class="panel-label">AI Output</div>
                        <div class="code-container">
                            <div class="lines" id="ln-output">1</div>
                            <textarea id="output-editor" readonly placeholder="Aguardando comando..."></textarea>
                            <div id="loader" class="loader hidden">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="action-bar">
                    <button class="action-btn glow-purple" onclick="runAI('Fix errors and optimize this script')"><i class="fas fa-magic"></i> Auto-Fix</button>
                    <button class="action-btn glow-blue" onclick="runAI('Refactor this code using modern Luau standards')"><i class="fas fa-code"></i> Refactor</button>
                    <button class="action-btn" onclick="runAI('Explain every part of this script')"><i class="fas fa-microscope"></i> Explain</button>
                    <button class="btn-send" onclick="runAI()"><i class="fas fa-paper-plane"></i> Generate</button>
                </div>
            </main>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
