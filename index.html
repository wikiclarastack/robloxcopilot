<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EclipseCopilot — Roblox AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070a10;
            --s1: #0d1322;
            --s2: #111b30;
            --border: #1d2d4a;
            --accent: #00d4ff;
            --purple: #7c3aed;
            --green: #10b981;
            --red: #ef4444;
            --text: #e2eaf8;
            --muted: #5a7090;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #cur, #ring { position: fixed; pointer-events: none; z-index: 9999; border-radius: 50%; }
        #cur { width: 8px; height: 8px; background: var(--accent); }
        #ring { width: 24px; height: 24px; border: 1.5px solid rgba(0,212,255,0.3); transition: transform 0.1s ease-out; }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        header { text-align: center; margin-bottom: 50px; }
        h1 { font-family: 'Syne', sans-serif; font-size: 54px; letter-spacing: -2px; margin-bottom: 10px; background: linear-gradient(90deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .conn-card {
            background: var(--s1);
            border: 1px solid var(--border);
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); margin-right: 10px; display: inline-block; }
        .status-dot.online { background: var(--green); box-shadow: 0 0 10px var(--green); }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 25px; }

        label { display: block; font-size: 10px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-weight: bold; }
        input, select, textarea {
            width: 100%;
            background: var(--s2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            outline: none;
            margin-bottom: 20px;
            font-family: inherit;
        }

        input:focus, textarea:focus { border-color: var(--accent); }

        .btn-gen {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-gen:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(124,58,237,0.3); }
        .btn-gen:disabled { opacity: 0.5; }

        .code-out {
            background: #050810;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #a8cfe4;
            font-size: 12px;
        }

        .btn-send {
            width: 100%;
            margin-top: 15px;
            background: var(--green);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .log-box {
            margin-top: 20px;
            height: 100px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            padding: 10px;
            font-size: 10px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .log-entry { margin-bottom: 4px; border-left: 2px solid var(--muted); padding-left: 8px; }
        .log-success { border-color: var(--green); color: var(--green); }
        .log-error { border-color: var(--red); color: var(--red); }
    </style>
</head>
<body>

<div id="cur"></div><div id="ring"></div>

<div class="container">
    <header>
        <h1>EclipseCopilot</h1>
        <p style="color: var(--muted)">AI-Powered Roblox Scripting Bridge</p>
    </header>

    <div class="conn-card">
        <div>
            <span id="dot" class="status-dot"></span>
            <span id="status-text">Bridge Offline</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <input id="bridgeUrl" value="http://127.0.0.1:3001" style="margin: 0; width: 200px; padding: 5px 10px;">
            <button onclick="checkBridge()" style="background: var(--border); color: white; border: none; padding: 5px 15px; border-radius: 5px;">Reconectar</button>
        </div>
    </div>

    <div class="main-grid">
        <div class="panel">
            <label>API Key (OpenRouter)</label>
            <input type="password" id="apiKey" placeholder="sk-or-v1-...">

            <label>Modelo</label>
            <select id="model">
                <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
                <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
                <option value="deepseek/deepseek-chat">DeepSeek V3</option>
            </select>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label>Tipo</label>
                    <select id="scriptType">
                        <option value="Script">Server Script</option>
                        <option value="LocalScript">LocalScript</option>
                        <option value="ModuleScript">ModuleScript</option>
                    </select>
                </div>
                <div>
                    <label>Nome</label>
                    <input type="text" id="scriptName" value="EclipseGenerated">
                </div>
            </div>

            <label>Prompt do Script</label>
            <textarea id="prompt" rows="6" placeholder="Ex: Sistema de inventário com DataStore..."></textarea>

            <button class="btn-gen" id="genBtn" onclick="generateScript()">⚡ Gerar Script</button>
        </div>

        <div class="panel">
            <label>Output Luau</label>
            <div class="code-out" id="codeOut">-- O código aparecerá aqui...</div>
            
            <button class="btn-send" id="sendBtn" onclick="sendToStudio()">🎮 Enviar para o Roblox Studio</button>

            <div class="log-box" id="logs">
                <div class="log-entry">Sistema iniciado. Aguardando comando...</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Cursor Logic
    const cur = document.getElementById('cur'), ring = document.getElementById('ring');
    let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX; mouseY = e.clientY;
        cur.style.left = mouseX + 'px'; cur.style.top = mouseY + 'px';
    });

    function tick() {
        ringX += (mouseX - ringX - 12) * 0.15;
        ringY += (mouseY - ringY - 12) * 0.15;
        ring.style.left = ringX + 'px'; ring.style.top = ringY + 'px';
        requestAnimationFrame(tick);
    }
    tick();

    // App Logic
    function log(msg, type = '') {
        const box = document.getElementById('logs');
        const div = document.createElement('div');
        div.className = `log-entry ${type ? 'log-'+type : ''}`;
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        box.prepend(div);
    }

    async function checkBridge() {
        const url = document.getElementById('bridgeUrl').value;
        try {
            const res = await fetch(`${url}/status`);
            if(res.ok) {
                document.getElementById('dot').className = 'status-dot online';
                document.getElementById('status-text').innerText = 'Bridge Online';
                return true;
            }
        } catch (e) {
            document.getElementById('dot').className = 'status-dot';
            document.getElementById('status-text').innerText = 'Bridge Offline';
            return false;
        }
    }
    setInterval(checkBridge, 5000);

    async function generateScript() {
        const key = document.getElementById('apiKey').value;
        const promptText = document.getElementById('prompt').value;
        const genBtn = document.getElementById('genBtn');

        if(!key || !promptText) return log("Falta API Key ou Prompt", "error");

        genBtn.disabled = true;
        genBtn.innerText = "Gerando...";
        log("Solicitando código à IA...");

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${key}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": document.getElementById('model').value,
                    "messages": [
                        { "role": "system", "content": "You are a Roblox Luau expert. Output ONLY code. No markdown blocks, no comments, no explanations." },
                        { "role": "user", "content": promptText }
                    ]
                })
            });

            const data = await response.json();
            const code = data.choices[0].message.content.trim();
            
            document.getElementById('codeOut').innerText = code;
            document.getElementById('sendBtn').style.display = 'block';
            log("Script gerado com sucesso!", "success");

        } catch (e) {
            log("Erro ao gerar script", "error");
        } finally {
            genBtn.disabled = false;
            genBtn.innerText = "⚡ Gerar Script";
        }
    }

    async function sendToStudio() {
        const bridge = document.getElementById('bridgeUrl').value;
        const payload = {
            name: document.getElementById('scriptName').value,
            type: document.getElementById('scriptType').value,
            content: document.getElementById('codeOut').innerText
        };

        try {
            const res = await fetch(`${bridge}/push-scripts`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if(res.ok) log("Script enviado para a fila do Studio!", "success");
        } catch (e) {
            log("Falha ao enviar para o Bridge. Verifique o console.", "error");
        }
    }
</script>

</body>
</html>
