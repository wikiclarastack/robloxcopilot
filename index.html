<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EclipseCopilot // Advanced Roblox AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <section id="view-landing" class="view">
        <nav class="l-nav">
            <div class="logo">Eclipse<span>Copilot</span></div>
            <button class="btn-enter" onclick="switchView('app')">Dashboard <i class="fas fa-arrow-right"></i></button>
        </nav>
        <div class="l-hero">
            <div class="hero-content">
                <span class="badge">Next-Gen Luau AI</span>
                <h1>Code faster than <br><span class="highlight">ever before.</span></h1>
                <p>O Eclipse transforma suas ideias em scripts otimizados para Roblox Studio em segundos. Sem bugs, sem enrolação.</p>
                <div class="h-btns">
                    <button class="btn-p" onclick="switchView('app')">Start Scripting</button>
                    <button class="btn-s">View Docs</button>
                </div>
            </div>
        </div>
    </section>

    <section id="view-app" class="view hidden">
        <div class="sidebar">
            <div class="s-logo" onclick="switchView('landing')"><i class="fas fa-adjust"></i></div>
            <nav>
                <button class="s-nav active" onclick="showTab('editor')"><i class="fas fa-code"></i></button>
                <button class="s-nav" onclick="showTab('settings')"><i class="fas fa-sliders"></i></button>
            </nav>
            <div id="api-status" class="status-indicator"></div>
        </div>

        <main class="main-content">
            <div id="tab-editor" class="tab active">
                <header class="m-header">
                    <div class="h-title">
                        <h2>Script Editor</h2>
                        <p>workspace / <b>main.luau</b></p>
                    </div>
                    <div class="h-controls">
                        <select id="model-select">
                            <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                            <option value="llama-3.1-8b-instant">Llama 3.1 8B</option>
                            <option value="qwen/qwen3-32b">Qwen 3 32B</option>
                            <option value="openai/gpt-oss-120b">GPT-OSS 120B</option>
                        </select>
                        <button class="btn-tool" onclick="copyCode()"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                </header>

                <div class="editor-grid">
                    <div class="card">
                        <div class="card-head">Prompt</div>
                        <textarea id="p-input" placeholder="O que vamos buildar hoje? Ex: Sistema de inventário com DataStore..."></textarea>
                    </div>
                    <div class="card">
                        <div class="card-head">Output</div>
                        <div class="code-area">
                            <textarea id="p-output" readonly placeholder="Aguardando comando..."></textarea>
                            <div id="loader" class="loader hidden"><div class="bar"></div></div>
                        </div>
                    </div>
                </div>

                <div class="action-bar">
                    <div class="quick-actions">
                        <button onclick="runAction('Fix')">Fix Bugs</button>
                        <button onclick="runAction('Optimize')">Optimize</button>
                        <button onclick="runAction('Refactor')">Refactor</button>
                    </div>
                    <button class="btn-gen" onclick="generate()">Generate <kbd>Ctrl+K</kbd></button>
                </div>
            </div>

            <div id="tab-settings" class="tab">
                <div class="settings-pane">
                    <h3>Configurações</h3>
                    <div class="field">
                        <label>Groq API Key</label>
                        <input type="password" id="api-key-input" onchange="saveKey()" placeholder="gsk_...">
                        <span>Sua chave fica salva apenas no seu navegador.</span>
                    </div>
                </div>
            </div>
        </main>
    </section>

    <script src="script.js"></script>
</body>
</html>
