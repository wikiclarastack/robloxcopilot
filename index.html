<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EclipseCopilot | Luau AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-moon"></i>
                <span>EclipseCopilot</span>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-item active" onclick="switchTab('chat')"><i class="fas fa-comment-code"></i> Chat IA</button>
                <button class="nav-item" onclick="switchTab('editor')"><i class="fas fa-file-code"></i> Editor</button>
                <button class="nav-item" onclick="switchTab('history')"><i class="fas fa-history"></i> Histórico</button>
            </nav>

            <div class="tools-section">
                <p class="section-label">Ações Rápidas</p>
                <button class="tool-btn" onclick="quickAction('Fix Script')"><i class="fas fa-magic"></i> Fix Script</button>
                <button class="tool-btn" onclick="quickAction('Optimize')"><i class="fas fa-bolt"></i> Optimize</button>
                <button class="tool-btn" onclick="quickAction('Explain')"><i class="fas fa-book-open"></i> Explain</button>
                <button class="tool-btn" onclick="quickAction('Debug')"><i class="fas fa-bug"></i> Debug Script</button>
            </div>

            <div class="settings-box">
                <input type="password" id="api-key" placeholder="Groq API Key" onchange="saveKey()">
                <div class="token-info">Tokens: <span id="token-counter">0</span></div>
            </div>
        </aside>

        <main class="main-content">
            <div id="chat-tab" class="tab-content active">
                <div class="chat-container" id="chat-messages">
                    <div class="msg ai">Bem-vindo ao <b>EclipseCopilot</b>. Como posso ajudar no seu projeto Roblox hoje?</div>
                </div>
                <div class="input-container">
                    <div id="loading-indicator" class="loading hidden">Eclipse está pensando...</div>
                    <div class="input-area">
                        <textarea id="user-input" placeholder="Pergunte algo ou use --ai: no editor..."></textarea>
                        <button id="send-btn" onclick="handleChat()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <div id="editor-tab" class="tab-content">
                <div class="editor-toolbar">
                    <span class="file-name">main.luau</span>
                    <div class="editor-btns">
                        <button onclick="copyCode()"><i class="fas fa-copy"></i> Copiar</button>
                        <button onclick="clearEditor()"><i class="fas fa-trash"></i> Limpar</button>
                    </div>
                </div>
                <div class="editor-wrapper">
                    <div class="line-numbers" id="line-numbers"></div>
                    <textarea id="code-editor" spellcheck="false"></textarea>
                </div>
            </div>

            <div id="history-tab" class="tab-content">
                <div class="history-list" id="history-list">
                    <p style="padding: 20px; color: #666;">Nenhum histórico disponível.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
