<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EclipseCopilot // Advanced Luau AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="noise"></div>
    
    <div id="app">
        <aside class="main-sidebar">
            <div class="nav-top">
                <div class="app-logo">
                    <div class="logo-inner"></div>
                </div>
                <nav class="icon-nav">
                    <button class="nav-item active" onclick="showTab('editor')"><i class="fas fa-code"></i></button>
                    <button class="nav-item" onclick="showTab('settings')"><i class="fas fa-sliders"></i></button>
                </nav>
            </div>
            <div class="nav-bottom">
                <div class="status-dot tooltip">
                    <span id="api-indicator"></span>
                    <span class="tooltip-text">API Status</span>
                </div>
            </div>
        </aside>

        <main class="content-area">
            
            <section id="tab-editor" class="tab-content active">
                <header class="tab-header">
                    <div class="header-left">
                        <h1>Script Editor</h1>
                        <span class="breadcrumb">EclipseCopilot / workspace / <strong>main.luau</strong></span>
                    </div>
                    <div class="header-right">
                        <select id="model-select" class="modern-select">
                            <option value="llama3-70b-8192">Llama3 70B (High Intelligence)</option>
                            <option value="llama3-8b-8192">Llama3 8B (Fast)</option>
                            <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                        </select>
                        <button class="btn-secondary" onclick="copyResult()"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                </header>

                <div class="workspace-grid">
                    <div class="editor-pane">
                        <div class="pane-label">Prompt & Context</div>
                        <div class="editor-wrapper">
                            <div class="line-numbers" id="ln-input">1</div>
                            <textarea id="ai-input" spellcheck="false" placeholder="Descreva o que você quer criar..."></textarea>
                        </div>
                    </div>
                    <div class="editor-pane result-pane">
                        <div class="pane-label">Optimized Luau Output</div>
                        <div class="editor-wrapper">
                            <div class="line-numbers" id="ln-output">1</div>
                            <textarea id="ai-output" readonly placeholder="Aguardando entrada..."></textarea>
                            <div id="ai-loader" class="ai-loader hidden">
                                <div class="glow-bar"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <footer class="action-footer">
                    <div class="preset-group">
                        <button onclick="quickAction('Corrija erros de sintaxe e lógica neste código')">Fix Bugs</button>
                        <button onclick="quickAction('Otimize este código para performance máxima no Roblox')">Optimize</button>
                        <button onclick="quickAction('Comente cada linha deste código detalhadamente')">Explain</button>
                    </div>
                    <button class="btn-generate" onclick="generateResponse()">
                        <span>Generate</span>
                        <kbd>CMD + K</kbd>
                    </button>
                </footer>
            </section>

            <section id="tab-settings" class="tab-content">
                <header class="tab-header">
                    <h1>Settings</h1>
                </header>
                <div class="settings-form">
                    <div class="setting-item">
                        <label>Groq API Key</label>
                        <p>Sua chave é salva apenas no seu navegador.</p>
                        <input type="password" id="groq-key-input" placeholder="gsk_..." onchange="saveKey()">
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
